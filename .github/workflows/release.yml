name: Release

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  pr-quality-report:
    name: PR quality report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        id: coverage
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        id: codecov
        if: always() && steps.coverage.outcome == 'success'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: vitest
          name: vitest
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: true
          use_oidc: true

      - name: Run benchmark
        id: benchmark
        if: always() && steps.coverage.outcome == 'success'
        env:
          BENCH_TIME_MS: 1000
          BENCH_WARMUP_MS: 250
        run: node scripts/benchmark-transform.mjs --output "$RUNNER_TEMP/benchmark.md"

      - name: Comment quality report on PR
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          COVERAGE_STATUS: ${{ steps.coverage.outcome }}
          CODECOV_STATUS: ${{ steps.codecov.outcome }}
          BENCHMARK_STATUS: ${{ steps.benchmark.outcome }}
          BENCHMARK_MARKDOWN_PATH: ${{ runner.temp }}/benchmark.md
        run: node scripts/comment-pr-quality-report.mjs

  pr-beta:
    name: Publish PR beta
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == (vars.NPM_RELEASE_USER || 'Justinidlerz') &&
      github.triggering_actor == (vars.NPM_RELEASE_USER || 'Justinidlerz')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm trusted publishing toolchain
        run: |
          node --version
          npm --version
          node - <<'NODE'
          const { execFileSync } = require('node:child_process');
          const version = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim();
          const parts = version.split('.').map(Number);
          const minimum = [11, 5, 1];
          const supported = parts[0] > minimum[0] ||
            (parts[0] === minimum[0] && (
              parts[1] > minimum[1] ||
              (parts[1] === minimum[1] && parts[2] >= minimum[2])
            ));
          if (!supported) {
            throw new Error(`npm ${version} is too old for trusted publishing; npm >= 11.5.1 is required.`);
          }
          NODE

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset release
        id: changeset
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          pnpm exec changeset status --since "origin/${BASE_REF}" --output "$RUNNER_TEMP/changeset-status.json"
          node scripts/changeset-has-release.mjs "$RUNNER_TEMP/changeset-status.json"

      - name: Version package for beta
        id: beta
        if: steps.changeset.outputs.has_release == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export BETA_DATE="$(date -u +%Y%m%d%H%M%S)"
          pnpm exec changeset version
          node scripts/apply-pr-beta-version.mjs

      - name: Publish beta package
        if: steps.changeset.outputs.has_release == 'true'
        run: pnpm run publish:beta

      - name: Comment beta release on PR
        if: steps.changeset.outputs.has_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PACKAGE_NAME: ${{ steps.changeset.outputs.package_name }}
          BETA_VERSION: ${{ steps.beta.outputs.beta_version }}
          NPM_TAG: beta
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/comment-pr-beta-release.mjs

  release:
    name: Publish release
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      github.actor == (vars.NPM_RELEASE_USER || 'Justinidlerz')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm trusted publishing toolchain
        run: |
          node --version
          npm --version
          node - <<'NODE'
          const { execFileSync } = require('node:child_process');
          const version = execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim();
          const parts = version.split('.').map(Number);
          const minimum = [11, 5, 1];
          const supported = parts[0] > minimum[0] ||
            (parts[0] === minimum[0] && (
              parts[1] > minimum[1] ||
              (parts[1] === minimum[1] && parts[2] >= minimum[2])
            ));
          if (!supported) {
            throw new Error(`npm ${version} is too old for trusted publishing; npm >= 11.5.1 is required.`);
          }
          NODE

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset release
        id: changeset
        run: |
          if pnpm exec changeset status --output "$RUNNER_TEMP/changeset-status.json"; then
            node scripts/changeset-has-release.mjs "$RUNNER_TEMP/changeset-status.json"
          else
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable changeset found for this package."
          fi

      - name: Version package
        if: steps.changeset.outputs.has_release == 'true'
        run: pnpm exec changeset version

      - name: Commit release metadata
        if: steps.changeset.outputs.has_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .changeset package.json pnpm-lock.yaml
          if [ -f CHANGELOG.md ]; then
            git add CHANGELOG.md
          fi
          git commit -m "Version packages"

      - name: Build package
        if: steps.changeset.outputs.has_release == 'true'
        run: pnpm run build

      - name: Publish package
        if: steps.changeset.outputs.has_release == 'true'
        run: npm publish

      - name: Tag published package
        if: steps.changeset.outputs.has_release == 'true'
        run: pnpm exec changeset tag

      - name: Push release commit and tags
        if: steps.changeset.outputs.has_release == 'true'
        run: git push origin HEAD:master --follow-tags
